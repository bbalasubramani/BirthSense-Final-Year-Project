services:
  - type: web
    name: birthsense-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
        key: FRONTEND_ORIGIN
        sync: false
      - key: PORT
        value: 10000
